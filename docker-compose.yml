version: '3.8'

services:
  luxe-creator:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: luxe-creator-app
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000', (r) => {if (r.statusCode !== 200) throw new Error(r.statusCode)})"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    networks:
      - luxe-network
    volumes:
      - ./dist:/app/dist:ro
    security_opt:
      - no-new-privileges:true

networks:
  luxe-network:
    driver: bridge
